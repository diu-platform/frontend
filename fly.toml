# fly.toml app configuration file generated for diu-platform-frontend on 2026-04-26T18:10:28+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'diu-platform-frontend'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
